# Production Profile Configuration
spring.profiles.active=prod

# Production Database - Railway will provide DATABASE_URL for MySQL
spring.datasource.url=${DATABASE_URL}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Settings for Production
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Production server settings - Railway sets PORT
server.port=${PORT:8080}

# Production logging - less verbose
logging.level.com.fredvested=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=WARN

# Production Turnstile - must be set via Railway environment variable
cloudflare.turnstile.secret=${CLOUDFLARE_TURNSTILE_SECRET}

# Production CORS - set via Railway environment variable
cors.allowed.origins=${CORS_ALLOWED_ORIGINS}

# Actuator configuration - disable problematic metrics for Railway
management.metrics.enabled=true
management.metrics.binders.processor.enabled=false
management.metrics.binders.uptime.enabled=false
management.endpoints.web.exposure.include=health,info