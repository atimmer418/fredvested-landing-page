# Production Profile Configuration
spring.profiles.active=prod

# Production Database - Railway will provide DATABASE_URL
spring.datasource.url=${DATABASE_URL}
spring.datasource.driver-class-name=${DATABASE_DRIVER:org.postgresql.Driver}

# JPA Settings for Production
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:validate}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=${HIBERNATE_DIALECT:org.hibernate.dialect.PostgreSQLDialect}

# Production server settings - Railway sets PORT
server.port=${PORT:8080}

# Production logging - less verbose
logging.level.com.fredvested=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=WARN

# Production Turnstile - must be set via Railway environment variable
cloudflare.turnstile.secret=${CLOUDFLARE_TURNSTILE_SECRET}

# Production CORS - set via Railway environment variable
cors.allowed.origins=${CORS_ALLOWED_ORIGINS}