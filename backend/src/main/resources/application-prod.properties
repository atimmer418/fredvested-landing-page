# Production Database
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?useSSL=true&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.defer-datasource-initialization=false
spring.sql.init.mode=never
spring.sql.init.continue-on-error=true

# JPA Settings for Production
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Production server settings - Railway sets PORT
server.port=8080

# Production logging - less verbose
logging.level.com.fredvested=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=WARN

# Production Turnstile - must be set via Railway environment variable
cloudflare.turnstile.secret=${CLOUDFLARE_TURNSTILE_SECRET}

# Production CORS - set via Railway environment variable
cors.allowed.origins=${CORS_ALLOWED_ORIGINS}

# Resend (email)
resend.api-key=${RESEND_API_KEY}

# Admin batch endpoint secret
admin.secret=${ADMIN_SECRET}