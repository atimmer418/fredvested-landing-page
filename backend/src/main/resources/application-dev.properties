# Development Profile Configuration
spring.profiles.active=dev

# Development Database (H2 in-memory for local testing)
spring.datasource.url=jdbc:h2:mem:devdb
spring.datasource.driver-class-name=org.h2.Driver
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA Settings for Development
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Development server settings
server.port=8080

# Development logging - more verbose
logging.level.com.fredvested=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# Development Turnstile (use test key)
cloudflare.turnstile.secret=${CLOUDFLARE_TURNSTILE_SECRET:1x0000000000000000000000000000000AA}

# Development CORS - allow localhost
cors.allowed.origins=http://localhost:3000,http://localhost:5173