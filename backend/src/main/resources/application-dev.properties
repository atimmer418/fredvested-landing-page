# Database Configuration - Nuclear Option
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?useSSL=true&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.defer-datasource-initialization=false
spring.sql.init.mode=never
spring.sql.init.continue-on-error=true

# --- JPA / Hibernate Configuration ---
# Use 'create-drop' to force table creation and debugging
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.show_sql=false

# JPA Settings for Development
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Development server settings
server.port=8080

# Development logging - more verbose
logging.level.com.fredvested=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# Development Turnstile (use test key)
cloudflare.turnstile.secret=${CLOUDFLARE_TURNSTILE_SECRET:1x0000000000000000000000000000000AA}

# Development CORS - allow localhost
cors.allowed.origins=http://localhost:3000,http://localhost:5173
