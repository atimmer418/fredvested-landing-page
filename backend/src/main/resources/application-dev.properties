# Development Database (MySQL)
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/fredvested_dev}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Settings for Development
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Development server settings
server.port=8080

# Development logging - more verbose
logging.level.com.fredvested=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# Development Turnstile (use test key)
cloudflare.turnstile.secret=${CLOUDFLARE_TURNSTILE_SECRET:1x0000000000000000000000000000000AA}

# Development CORS - allow localhost
cors.allowed.origins=http://localhost:3000,http://localhost:5173
