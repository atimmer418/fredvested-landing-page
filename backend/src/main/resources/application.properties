spring.application.name=web
# Database configuration (Railway will inject DATABASE_URL)
spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:testdb}
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}

# Server configuration
server.port=${PORT:8080}

# Logging
logging.level.com.fredvested=${LOG_LEVEL:INFO}
logging.level.org.springframework.web=${SPRING_WEB_LOG_LEVEL:WARN}

# Cloudflare Turnstile
cloudflare.turnstile.secret=${CLOUDFLARE_TURNSTILE_SECRET}

# CORS Origins
cors.allowed.origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}