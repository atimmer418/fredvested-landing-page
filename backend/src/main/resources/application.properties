spring.application.name=web
# Database configuration (Railway will inject DATABASE_URL)
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}

# HikariCP Configuration
# Set max-lifetime to 10 minutes (600000ms) to prevent using stale connections
spring.datasource.hikari.max-lifetime=600000
# Set idle-timeout to 5 minutes (300000ms) to fix "idleTimeout is close to or more than maxLifetime" warning
spring.datasource.hikari.idle-timeout=300000
# Increase connection timeout to 60s (was 30s) to allow sleeping DBs to wake up
spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.maximum-pool-size=10

# Server configuration
server.port=${PORT:8080}

# Logging
logging.level.com.fredvested=${LOG_LEVEL:INFO}
logging.level.org.springframework.web=${SPRING_WEB_LOG_LEVEL:WARN}

# Cloudflare Turnstile
cloudflare.turnstile.secret=${CLOUDFLARE_TURNSTILE_SECRET}

# CORS Origins
cors.allowed.origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# Actuator configuration - disable problematic metrics for Railway
management.metrics.enabled=true
management.metrics.binders.processor.enabled=false
management.metrics.binders.uptime.enabled=false
management.endpoints.web.exposure.include=health,info
